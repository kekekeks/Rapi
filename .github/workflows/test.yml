name: Tests

on:
  pull_request:
    branches:
      - '**'

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Rapi.sln

      - name: Build
        run: dotnet build Rapi.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Rapi.Tests/Rapi.Tests.csproj --no-build --configuration Release --logger "console;verbosity=normal"
