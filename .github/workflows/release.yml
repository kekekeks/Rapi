name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Rapi.sln

      - name: Build
        run: dotnet build Rapi.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Rapi.Tests/Rapi.Tests.csproj --no-build --configuration Release --logger "console;verbosity=normal"

  publish-nuget:
    name: Publish NuGet Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Rapi.sln

      - name: Pack
        run: dotnet pack Rapi/Rapi.csproj --configuration Release --no-restore -o ./nupkg

      - name: Publish to GitHub Packages
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate

  publish-agent:
    name: Publish RapiAgent (${{ matrix.rid }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - rid: linux-x64
            asset: RapiAgent-linux-x64
          - rid: win-x64
            asset: RapiAgent-win-x64.exe
          - rid: osx-x64
            asset: RapiAgent-osx-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Rapi.sln

      - name: Publish self-contained single-file
        run: >
          dotnet publish RapiAgent/RapiAgent.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output ./publish/${{ matrix.rid }}

      - name: Rename artifact
        run: |
          src=$(find ./publish/${{ matrix.rid }} -maxdepth 1 -name 'RapiAgent*' ! -name '*.pdb' | head -1)
          mv "$src" ./publish/${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ./publish/${{ matrix.asset }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-agent
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            ./artifacts/RapiAgent-linux-x64/RapiAgent-linux-x64 \
            ./artifacts/RapiAgent-win-x64.exe/RapiAgent-win-x64.exe \
            ./artifacts/RapiAgent-osx-x64/RapiAgent-osx-x64
